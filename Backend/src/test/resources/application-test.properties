# Test Configuration - H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# JWT Configuration for tests
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1obWFjLXNoYTI1NiEh
jwt.expiration=86400000
jwt.refresh-token.expiration=604800000

# File storage for tests
spring.datasource.files.path=${java.io.tmpdir}/personalfit-test-files

# Multipart
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

# Cookie Configuration for Tests
app.cookie.secure=false
app.cookie.same-site=Lax
app.cookie.domain=localhost
app.cookie.access-token-max-age=86400
app.cookie.refresh-token-max-age=604800

# Logging
logging.level.root=WARN
logging.level.com.personalfit=DEBUG
