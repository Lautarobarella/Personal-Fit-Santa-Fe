spring.application.name=personal-fit
spring.datasource.url=jdbc:postgresql://personalfit-db:5432/postgres
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Configuración de pool de conexiones
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

# Configuración de archivos de comprobantes
spring.datasource.files.path=${SPRING_DATASOURCE_FILES_PATH}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-token.expiration=604800000

# Firebase Configuration for Push Notifications
# Firebase config is read directly from JSON file at /opt/firebase/firebase-service-account.json

# Cookie Configuration for Production
app.cookie.secure=true
app.cookie.same-site=Strict
app.cookie.domain=.personalfitsantafe.com
app.cookie.access-token-max-age=86400
app.cookie.refresh-token-max-age=604800

# Logging: stdout only. Rotation is delegated to Docker (json-file driver,
# configured in docker-compose.yml). No file appender to avoid filling the
# container/VPS disk with unbounded log files.
logging.level.root=WARN
logging.level.com.personalfit=INFO
# TEMPORARY (debugging notification 500s): full step-by-step trace of the
# /api/notifications/new flow. Revert these three lines to INFO once the root
# cause is confirmed, to avoid log noise.
logging.level.com.personalfit.controllers.NotificationController=DEBUG
logging.level.com.personalfit.services.NotificationService=DEBUG
logging.level.com.personalfit.services.FCMService=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.security=WARN
# Expired/invalid JWTs are an expected runtime situation (token rotation,
# user idle, attacker probes). Keep at WARN to avoid stack-trace flooding.
logging.level.io.jsonwebtoken=WARN