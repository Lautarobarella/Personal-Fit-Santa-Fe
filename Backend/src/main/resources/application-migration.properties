# Perfil específico para migraciones
spring.application.name=personal-fit
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA para migraciones
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Configuración de pool de conexiones para migraciones
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuración de conexión a base de datos más robusta
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-token.expiration=604800000

# Configuración de logging para migraciones
logging.level.root=INFO
logging.level.com.personalfit=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.springframework.security=WARN

# Configuración de servidor
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Configuración de gestión de aplicaciones
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
