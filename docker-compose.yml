# Project name fijo: el volumen pgdata vive como <name>_pgdata en producción.
# NO cambiar, o compose crearía un volumen nuevo vacío para postgres.
name: personal-fit-santa-fe

networks:
  personalfit-network:
    driver: bridge
    name: personalfit-network

services:
  postgres:
    image: postgres:15
    container_name: personalfit-db
    restart: unless-stopped
    networks:
      - personalfit-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  personalfit-backend:
    # Repo privado unico: los tags llevan prefijo backend-/frontend-.
    # IMAGE_TAG=v1.0.0 pinea esa version; sin definir usa "latest".
    image: feraleutnsantafe/personalfit:backend-${IMAGE_TAG:-latest}
    container_name: personalfit-backend
    restart: unless-stopped
    networks:
      - personalfit-network
    depends_on:
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      SPRING_DATASOURCE_FILES_PATH: ${SPRING_DATASOURCE_FILES_PATH}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-5}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-2}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      JWT_SECRET: ${JWT_SECRET}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-false}
      APP_COOKIE_SAME_SITE: ${APP_COOKIE_SAME_SITE:-Lax}
      APP_COOKIE_DOMAIN: ${APP_COOKIE_DOMAIN:-}
      APP_COOKIE_ACCESS_TOKEN_MAX_AGE: ${APP_COOKIE_ACCESS_TOKEN_MAX_AGE:-86400}
      APP_COOKIE_REFRESH_TOKEN_MAX_AGE: ${APP_COOKIE_REFRESH_TOKEN_MAX_AGE:-604800}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${RECEIPTS_HOST_PATH:-/opt/backups/comprobantes}:${SPRING_DATASOURCE_FILES_PATH}
      - ${FIREBASE_HOST_PATH:-/opt/firebase}:/opt/firebase:ro

  personalfit-frontend:
    # Las variables NEXT_PUBLIC_* quedan horneadas en la imagen durante el build
    # en GitHub Actions (secrets del environment Production).
    image: feraleutnsantafe/personalfit:frontend-${IMAGE_TAG:-latest}
    container_name: personalfit-frontend
    restart: unless-stopped
    networks:
      - personalfit-network
    depends_on:
      - personalfit-backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://personalfit-backend:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production

  pgadmin:
    image: dpage/pgadmin4
    container_name: personalfit-pgadmin
    restart: unless-stopped
    networks:
      - personalfit-network
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@personalfit.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - postgres

volumes:
  pgdata:
